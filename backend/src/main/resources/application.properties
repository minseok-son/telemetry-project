spring.application.name=backend

# Use placeholders for Docker, but provide a 'localhost' fallback for local IDE runs
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Database Configuration using placeholders
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/telemetry_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# This prevents Spring from crashing if the queue hasn't been created yet
spring.rabbitmq.dynamic=true

spring.jpa.hibernate.ddl-auto=update
# This helps see exactly what name Hibernate is using
